<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NormieFILTER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
:root{--dark:#48494b;--light:#e3e5e4;--mid:#c4c6c5;--bg:#e3e5e4;--darker:#2e2f30}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--dark);font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 80px}
header{width:100%;max-width:720px;background:var(--dark);color:var(--light);padding:14px 20px;border:3px solid var(--darker);box-shadow:5px 5px 0 var(--darker);display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.logo{font-size:18px;letter-spacing:.15em}.logo span{opacity:.4}
.sub{font-size:11px;opacity:.4;letter-spacing:.15em}
.card{width:100%;max-width:720px;border:2px solid var(--dark);background:var(--light);padding:20px;box-shadow:4px 4px 0 var(--dark);margin-bottom:14px}
.lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;opacity:.5;margin-bottom:12px}
.dz{border:3px dashed var(--mid);background:var(--bg);padding:40px 20px;text-align:center;cursor:pointer;transition:.15s;position:relative}
.dz:hover,.dz.over{border-color:var(--dark);background:#d8dad9}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ctrl{display:flex;flex-direction:column;gap:7px}
.clbl{font-size:10px;letter-spacing:.15em;text-transform:uppercase;opacity:.5}
.srow{display:flex;align-items:center;gap:10px}
input[type=range]{flex:1;-webkit-appearance:none;height:2px;background:var(--dark);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--dark);border:3px solid var(--light);box-shadow:0 0 0 1px var(--dark);cursor:pointer}
.sv{font-size:15px;min-width:40px;text-align:right;opacity:.7}
.tbar{height:8px;border:1px solid var(--mid);background:linear-gradient(to right,var(--dark),var(--light));position:relative;margin-top:3px}
.tmk{position:absolute;top:-3px;bottom:-3px;width:3px;background:#c0392b;transform:translateX(-50%);pointer-events:none}
.crow{display:flex;align-items:center;gap:8px}
.cbox{width:34px;height:34px;border:2px solid var(--dark);cursor:pointer;position:relative;overflow:hidden;flex-shrink:0}
.cbox input{position:absolute;inset:-6px;width:calc(100% + 12px);height:calc(100% + 12px);border:none;padding:0;cursor:pointer;opacity:0}
.swp{background:none;border:2px solid var(--mid);color:var(--dark);font-family:'Share Tech Mono',monospace;font-size:16px;padding:5px 10px;cursor:pointer;line-height:1}
.swp:hover{border-color:var(--dark)}
.clbl2{font-size:12px;opacity:.5}
.parea{display:flex;gap:14px;align-items:flex-start}
.ppanel{flex:1;display:flex;flex-direction:column;gap:5px}
.plbl{font-size:10px;letter-spacing:.15em;text-transform:uppercase;opacity:.4}
.cwrap{border:2px solid var(--dark);background:var(--darker);overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:100px}
.cwrap canvas,.cwrap img{max-width:100%;max-height:360px;display:block;image-rendering:pixelated}
.brow{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:2px solid var(--dark);background:var(--dark);color:var(--light);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:12px 18px;cursor:pointer;box-shadow:3px 3px 0 var(--darker);transition:all .08s}
.btn:hover{background:var(--darker)}.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--darker)}.btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:3px 3px 0 var(--darker)}
.btn.s{background:var(--light);color:var(--dark);border-color:var(--dark);box-shadow:3px 3px 0 var(--dark)}.btn.s:hover{background:#d0d2d1}
#st{font-size:12px;letter-spacing:.1em;opacity:.55;min-height:18px;margin-top:10px;text-align:center}
#st.err{color:#8b2020;opacity:1}#st.ok{color:#2a5c2a;opacity:1}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(72,73,75,.012) 3px,rgba(72,73,75,.012) 4px);pointer-events:none;z-index:9999}
</style>
</head>
<body>

<header>
  <div class="logo">NORMIE<span>_</span>FILTER</div>
  <div class="sub">Image → Pixel Normies Style</div>
</header>

<div class="card">
  <div class="lbl">Source — JPG · PNG · WEBP</div>
  <div class="dz" id="dz">
    <input type="file" id="fi" accept="image/png,image/jpeg,image/webp,image/bmp">
    <span style="font-size:36px;display:block;margin-bottom:10px">🖼️</span>
    <div style="font-size:15px;letter-spacing:.1em"><b>Drop image here or click</b></div>
    <div style="font-size:11px;opacity:.4;margin-top:6px;letter-spacing:.08em">JPG · PNG · WEBP · BMP</div>
  </div>
</div>

<div class="card" id="cc" style="display:none">
  <div class="lbl">Filter Settings</div>
  <div class="g2">
    <div class="ctrl">
      <div class="clbl">Pixel Size</div>
      <div class="srow">
        <input type="range" id="spx" min="1" max="32" value="6">
        <span class="sv" id="vpx">6px</span>
      </div>
    </div>
    <div class="ctrl">
      <div class="clbl">Threshold</div>
      <div class="srow">
        <input type="range" id="sth" min="0" max="255" value="128">
        <span class="sv" id="vth">128</span>
      </div>
      <div class="tbar"><div class="tmk" id="tmk" style="left:50%"></div></div>
    </div>
    <div class="ctrl" style="grid-column:1/-1">
      <div class="clbl">Colors</div>
      <div class="crow">
        <div class="cbox" id="bd"><input type="color" id="cd" value="#48494b"></div>
        <span class="clbl2">Dark</span>
        <button class="swp" id="swp">⇄</button>
        <div class="cbox" id="bl"><input type="color" id="cl" value="#e3e5e4"></div>
        <span class="clbl2">Light</span>
      </div>
    </div>
  </div>
</div>

<div class="card" id="pc" style="display:none">
  <div class="lbl">Preview</div>
  <div class="parea">
    <div class="ppanel">
      <div class="plbl">Original</div>
      <div class="cwrap"><img id="iorig" src="" alt="" style="max-width:100%;max-height:360px;display:block"></div>
    </div>
    <div class="ppanel">
      <div class="plbl">Normies Filter</div>
      <div class="cwrap"><canvas id="cout"></canvas></div>
    </div>
  </div>
  <div id="st"></div>
</div>

<div class="card" id="ec" style="display:none">
  <div class="lbl">Export</div>
  <div class="brow">
    <button class="btn" id="bpng" disabled>↓ Download PNG</button>
    <button class="btn s" id="bcopy" disabled>⎘ Copy Image</button>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const cout=$('cout'), cx=cout.getContext('2d');
const S={srcImg:null, px:6, th:128, colD:'#48494b', colL:'#e3e5e4'};

function st(msg,cls=''){$('st').textContent=msg;$('st').className=cls;}
function hRGB(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

function render(){
  if(!S.srcImg)return;
  st('Filtering…');

  // Draw source to temp canvas
  const c=document.createElement('canvas');
  c.width=S.srcImg.naturalWidth; c.height=S.srcImg.naturalHeight;
  const ctx=c.getContext('2d');
  ctx.drawImage(S.srcImg,0,0);
  const src=ctx.getImageData(0,0,c.width,c.height);

  const W=src.width, H=src.height;
  const sd=src.data;
  cout.width=W; cout.height=H;
  const out=new ImageData(W,H);
  const od=out.data;

  const pz=S.px, th=S.th;
  const[dr,dg,db]=hRGB(S.colD);
  const[lr,lg,lb]=hRGB(S.colL);
  const cols=Math.ceil(W/pz), rows=Math.ceil(H/pz);

  for(let row=0;row<rows;row++){
    for(let col=0;col<cols;col++){
      // Average luminance of block
      let ls=0, cnt=0;
      for(let dy=0;dy<pz;dy++){
        for(let dx=0;dx<pz;dx++){
          const px=col*pz+dx, py=row*pz+dy;
          if(px>=W||py>=H)continue;
          const i=(py*W+px)*4;
          ls+=0.299*sd[i]+0.587*sd[i+1]+0.114*sd[i+2];
          cnt++;
        }
      }
      const lum=cnt?ls/cnt:255;
      const dark=lum<th;
      const r=dark?dr:lr, g=dark?dg:lg, b=dark?db:lb;

      for(let dy=0;dy<pz;dy++){
        for(let dx=0;dx<pz;dx++){
          const px=col*pz+dx, py=row*pz+dy;
          if(px>=W||py>=H)continue;
          const i=(py*W+px)*4;
          od[i]=r; od[i+1]=g; od[i+2]=b; od[i+3]=255;
        }
      }
    }
  }

  cx.putImageData(out,0,0);
  st('Done','ok');
  $('bpng').disabled=false;
  $('bcopy').disabled=false;
}

function loadFile(file){
  if(!file)return;
  $('cc').style.display='block';
  $('pc').style.display='block';
  $('ec').style.display='block';
  $('bpng').disabled=true;
  $('bcopy').disabled=true;
  const url=URL.createObjectURL(file);
  $('iorig').src=url;
  const img=new Image();
  img.onload=()=>{S.srcImg=img; render();};
  img.src=url;
}

// Controls
let dbt;
function dbr(){clearTimeout(dbt);dbt=setTimeout(render,80);}

$('spx').addEventListener('input',e=>{S.px=parseInt(e.target.value);$('vpx').textContent=S.px+'px';dbr();});
$('sth').addEventListener('input',e=>{S.th=parseInt(e.target.value);$('vth').textContent=S.th;$('tmk').style.left=(S.th/255*100)+'%';dbr();});
$('cd').addEventListener('input',e=>{S.colD=e.target.value;$('bd').style.background=S.colD;dbr();});
$('cl').addEventListener('input',e=>{S.colL=e.target.value;$('bl').style.background=S.colL;dbr();});
$('swp').addEventListener('click',()=>{
  [S.colD,S.colL]=[S.colL,S.colD];
  $('cd').value=S.colD;$('cl').value=S.colL;
  $('bd').style.background=S.colD;$('bl').style.background=S.colL;
  dbr();
});

// Export
$('bpng').addEventListener('click',()=>{
  cout.toBlob(b=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(b);
    a.download='normie_filter.png';
    a.click();
  },'image/png');
});
$('bcopy').addEventListener('click',async()=>{
  try{
    const blob=await new Promise(r=>cout.toBlob(r,'image/png'));
    await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
    $('bcopy').textContent='✓ Copied!';
    setTimeout(()=>$('bcopy').textContent='⎘ Copy Image',2000);
  }catch(e){st('Copy failed','err');}
});

// Drop / file
$('fi').addEventListener('change',e=>loadFile(e.target.files[0]));
const dz=$('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');loadFile(e.dataTransfer.files[0]);});
document.addEventListener('paste',e=>{
  const it=[...(e.clipboardData?.items||[])].find(i=>i.type.startsWith('image/'));
  if(it)loadFile(it.getAsFile());
});

// Init
$('bd').style.background=S.colD;
$('bl').style.background=S.colL;
</script>
</body>
</html>
